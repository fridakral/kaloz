<div class="card bg-base-300 m-6">
  <div class="card-body">
    <h2 class="justify-text text-center"> Hasznos hírek</h2>
    @for (news of data(); track $index) {
      <div class="collapse collapse-arrow bg-base-100 border border-base-300">
        <input type="radio" name="home-side-accordion" checked="checked" />
        <div class="collapse-title font-semibold">{{news.title}}</div>
        <div class="collapse-content text-sm">{{news.paragraph}} <a href="{{news.url}}" target="_blank" class="text-blue-500 underline">Tovább</a></div>
      </div>
    }

  </div>
</div>
